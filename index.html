<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>尺寸表搜索工具</title>
    <!-- 图标资源 -->
    <link rel="icon" type="image/x-icon" href="favicon.ico">
    <link rel="icon" type="image/png" sizes="32x32" href="favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="favicon-16x16.png">
    <link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon.png">
    <link rel="manifest" href="site.webmanifest">
    <meta name="theme-color" content="#1a237e">
    <link rel="icon" type="image/png" sizes="192x192" href="android-chrome-192x192.png">
    <link rel="icon" type="image/png" sizes="512x512" href="android-chrome-512x512.png">
    <style>
        /* ==================== Fliqlo风格时间显示 ==================== */
        .fliqlo-time-display {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: #0a0e2a;
            z-index: 100;
            cursor: pointer;
            font-family: 'Arial', sans-serif;
            overflow: hidden;
        }

        /* GIF背景容器 - 居中显示不拉伸 */
        .fliqlo-gif-background {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            z-index: 1;
        }

        .fliqlo-gif-background img {
            width: auto;
            height: auto;
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
            opacity: 0.5;
        }

        /* 添加半透明遮罩，让时间文字更清晰 */
        .fliqlo-time-display::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(10, 14, 42, 0.6);
            z-index: 2;
        }

        .fliqlo-clock {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 8px;
            width: 100%;
            height: 100%;
            position: relative;
            z-index: 3;
        }

        .time-digits {
            display: flex;
            gap: 12px;
            font-size: 3.5rem;
            font-weight: 300;
            color: #ffffff;
            letter-spacing: 2px;
            text-shadow: 0 0 15px rgba(123, 239, 255, 0.7);
        }

        .time-colon {
            opacity: 0.8;
            animation: blink 1s infinite;
        }

        @keyframes blink {
            0%, 100% { opacity: 0.8; }
            50% { opacity: 0.3; }
        }

        .time-separator {
            width: 80%;
            height: 2px;
            background: rgba(123, 239, 255, 0.4);
            margin: 8px 0;
        }

        .date-display {
            font-size: 1.2rem;
            color: rgba(255, 255, 255, 0.95);
            margin-top: 8px;
            text-align: center;
            background: rgba(10, 14, 42, 0.5);
            padding: 8px 20px;
            border-radius: 12px;
            backdrop-filter: blur(8px);
            border: 0.1px solid rgba(123, 239, 255, 0.2);
        }

        .unlock-hint {
            position: absolute;
            bottom: 15px;
            font-size: 0.8rem;
            color: rgba(123, 239, 255, 0.8);
            text-align: center;
            background: rgba(10, 14, 42, 0.7);
            padding: 6px 12px;
            border-radius: 15px;
            border: 0.1px solid rgba(123, 239, 255, 0.2);
            animation: subtlePulse 2s infinite;
            z-index: 3;
        }

        @keyframes subtlePulse {
            0%, 100% { opacity: 0.8; }
            50% { opacity: 1; }
        }

        /* ==================== 其他样式保持不变 ==================== */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        
        /* 跑马灯边框动画 - 较慢版本 */
        @keyframes marqueeBorder {
            0% { box-shadow: inset 0 0 6px #ff0000; }
            12.5% { box-shadow: inset 0 0 6px #ff8000; }
            25% { box-shadow: inset 0 0 6px #ffff00; }
            37.5% { box-shadow: inset 0 0 6px #00ff00; }
            50% { box-shadow: inset 0 0 6px #00ffff; }
            62.5% { box-shadow: inset 0 0 6px #0080ff; }
            75% { box-shadow: inset 0 0 6px #0000ff; }
            87.5% { box-shadow: inset 0 0 6px #8000ff; }
            100% { box-shadow: inset 0 0 6px #ff0000; }
        }
        
        /* 为所有带边框的元素添加跑马灯效果 */
        .weather-module-fixed,
        .weather-module-detail-item-fixed,
        .calendar-module-fixed,
        .calendar-module-date-cell-fixed,
        .weather-container,
        .weather-detail-item,
        .weather-refresh,
        .weather-config-input,
        .weather-config-btn,
        .calendar-day,
        .calendar-date,
        .calendar-footer-item,
        .announcement-bar,
        .announcement-close,
        .search-container,
        .desktop-search-row,
        .desktop-search-btn,
        .mobile-search-row,
        .mobile-search-btn,
        .search-type-btn,
        .results-info,
        .time-display-container,
        .time-wrapper,
        .results-container,
        .image-card,
        .directory-container,
        .directory-item,
        .update-status,
        .weight-card,
        .weight-spec-item,
        .copy-all-btn,
        .modal-content,
        .modal-close,
        .copy-notification {
            border: none !important;
            border-radius: 8px !important;
            animation: marqueeBorder 3s linear infinite !important;
        }
        
        /* 北极光风吹效果的动态渐变背景 */
        html {
            background: linear-gradient(135deg, #0a2e36, #1e5128, #3d9970, #7fdbff, #8a2be2, #4b0082, #0a2e36);
            background-size: 400% 400%;
            animation: windBlow 20s ease infinite;
            min-height: 100vh;
        }
        
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
            background: transparent;
            color: #fff;
            line-height: 1.6;
            position: relative;
            overflow-x: hidden;
            min-height: 100vh;
            -webkit-tap-highlight-color: transparent;
            touch-action: manipulation;
        }
        
        @keyframes windBlow {
            0% {
                background-position: 0% 50%;
            }
            50% {
                background-position: 100% 50%;
            }
            100% {
                background-position: 0% 50%;
            }
        }
        
        /* 星空效果 */
        #stars {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -2;
            pointer-events: none;
        }
        
        .star {
            position: absolute;
            background-color: white;
            border-radius: 50%;
            animation: twinkle var(--duration) infinite alternate;
        }
        
        @keyframes twinkle {
            0% { 
                opacity: 0.3; 
                transform: scale(1);
            }
            50% {
                opacity: 0.9;
                transform: scale(1.2);
            }
            100% { 
                opacity: 0.5; 
                transform: scale(1);
            }
        }
        
        /* ==================== 固定在右侧的飞船天气日历 ==================== */
        .spaceship-weather-calendar {
            position: fixed;
            right: 20px;
            top: 50%;
            transform: translateY(-50%);
            width: 300px;
            z-index: 10;
            display: none;
            animation: floatInPlace 6s ease-in-out infinite;
        }

        /* 只在桌面端（1200px以上）显示 */
        @media (min-width: 1200px) {
            .spaceship-weather-calendar {
                display: block;
            }
        }

        /* 在所有平板和手机设备上隐藏 */
        @media (max-width: 1199px) {
            .spaceship-weather-calendar {
                display: none !important;
            }
        }

        .main-spaceship-fixed {
            position: relative;
            width: 100%;
            height: 120px;
            margin-bottom: 10px;
            z-index: 12;
        }

        .spaceship-gif-fixed {
            width: 100%;
            height: 100%;
            object-fit: contain;
            filter: drop-shadow(0 0 15px rgba(91, 192, 190, 0.9));
        }
        


        .connection-cable-fixed {
            position: relative;
            width: 4px;
            height: 25px;
            background: linear-gradient(to bottom, #7befff, #5bc0be);
            margin: 0 auto;
            z-index: 11;
        }

        .modules-container {
            position: relative;
            width: 100%;
            z-index: 10;
        }

        .weather-module-fixed {
            width: 100%;
            background: linear-gradient(135deg, rgba(10, 46, 54, 0.6), rgba(30, 81, 40, 0.6), rgba(61, 153, 112, 0.6), rgba(127, 219, 255, 0.6), rgba(138, 43, 226, 0.6), rgba(75, 0, 130, 0.6), rgba(10, 46, 54, 0.6));
            background-size: 400% 400%;
            animation: windBlow 20s ease infinite, borderRainbow 8s linear infinite;
            border-radius: 15px;
            padding: 15px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(15px);
            border: 0.05px solid;
            border-image: linear-gradient(45deg, 
                #ff0000, #ff8000, #ffff00, #00ff00, 
                #00ffff, #0080ff, #0000ff, #8000ff) 1;
            margin-bottom: 10px;
            overflow: hidden;
            position: relative;
        }

        @keyframes borderRainbow {
            0% { border-image-source: linear-gradient(45deg, #ff0000, #ff8000, #ffff00, #00ff00, #00ffff, #0080ff, #0000ff, #8000ff); }
            25% { border-image-source: linear-gradient(45deg, #8000ff, #ff0000, #ff8000, #ffff00, #00ff00, #00ffff, #0080ff, #0000ff); }
            50% { border-image-source: linear-gradient(45deg, #0000ff, #8000ff, #ff0000, #ff8000, #ffff00, #00ff00, #00ffff, #0080ff); }
            75% { border-image-source: linear-gradient(45deg, #0080ff, #0000ff, #8000ff, #ff0000, #ff8000, #ffff00, #00ff00, #00ffff); }
            100% { border-image-source: linear-gradient(45deg, #00ffff, #0080ff, #0000ff, #8000ff, #ff0000, #ff8000, #ffff00, #00ff00); }
        }

        .weather-module-header-fixed {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 10px;
            padding-bottom: 8px;
            border-bottom: 0.1px solid rgba(123, 239, 255, 0.2);
        }

        .weather-module-title-fixed {
            color: #7befff;
            font-size: 16px;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .weather-module-location-fixed {
            font-size: 12px;
            color: rgba(255, 255, 255, 0.7);
        }

        .weather-module-main-fixed {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 10px;
        }

        .weather-module-temp-fixed {
            font-size: 28px;
            font-weight: bold;
            color: #ffd166;
        }

        .weather-module-icon-fixed {
            font-size: 36px;
        }

        .weather-module-desc-fixed {
            font-size: 14px;
            color: rgba(255, 255, 255, 0.9);
            margin-bottom: 10px;
            text-align: center;
        }

        .weather-module-details-fixed {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 8px;
            font-size: 12px;
        }

        .weather-module-detail-item-fixed {
            text-align: center;
            padding: 8px;
            background: rgba(40, 53, 147, 0.6);
            border-radius: 6px;
            border: 0.1px solid;
            border-image: linear-gradient(45deg, 
                #ff0000, #ff8000, #ffff00, #00ff00, 
                #00ffff, #0080ff, #0000ff, #8000ff) 1;
        }

        .weather-module-detail-label-fixed {
            display: block;
            margin-bottom: 2px;
        }

        .weather-module-detail-value-fixed {
            display: block;
            color: #7befff;
            font-weight: 600;
        }

        .calendar-module-fixed {
            width: 100%;
            background: linear-gradient(145deg, rgba(26, 35, 126, 0.95), rgba(40, 53, 147, 0.95));
            border-radius: 15px;
            padding: 15px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(15px);
            border: 0.1px solid;
            border-image: linear-gradient(45deg, 
                #ff0000, #ff8000, #ffff00, #00ff00, 
                #00ffff, #0080ff, #0000ff, #8000ff) 1;
            overflow: hidden;
            position: relative;
            animation: borderRainbow 8s linear infinite;
        }

        .calendar-module-header-fixed {
            text-align: center;
            margin-bottom: 15px;
        }

        .calendar-module-title-fixed {
            color: #7befff;
            font-size: 18px;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .calendar-module-date-fixed {
            font-size: 24px;
            font-weight: bold;
            color: #fff;
            margin-bottom: 5px;
        }

        .calendar-module-lunar-fixed {
            font-size: 14px;
            color: #ffd166;
            background: rgba(255, 209, 102, 0.1);
            padding: 5px 12px;
            border-radius: 20px;
            display: inline-block;
            margin-bottom: 10px;
            border: 0.1px solid rgba(255, 209, 102, 0.3);
        }

        .calendar-module-grid-fixed {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 6px;
            margin-bottom: 10px;
        }

        .calendar-module-date-cell-fixed {
            text-align: center;
            padding: 8px;
            font-size: 12px;
            border-radius: 8px;
            background: rgba(28, 37, 65, 0.5);
            border: 0.1px solid;
            border-image: linear-gradient(45deg, 
                #ff0000, #ff8000, #ffff00, #00ff00, 
                #00ffff, #0080ff, #0000ff, #8000ff) 1;
            color: rgba(255, 255, 255, 0.9);
        }

        .calendar-module-date-cell-fixed.today {
            background: linear-gradient(145deg, #5bc0be, #3a506b);
            color: #fff;
            font-weight: bold;
            border-color: #7befff;
        }

        @keyframes floatInPlace {
            0%, 100% {
                transform: translateY(-50%);
            }
            50% {
                transform: translateY(-53%);
            }
        }

        .illustration-container {
            position: fixed;
            left: 20px;
            top: 50%;
            transform: translateY(-50%);
            width: 200px;
            height: 350px;
            z-index: 0;
            opacity: 0.9;
            display: none;
        }
        
        @media (min-width: 1200px) {
            .illustration-container {
                display: block;
            }
        }
        
        .astronaut {
            position: absolute;
            width: 140px;
            height: 180px;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            animation: float 6s ease-in-out infinite;
            filter: drop-shadow(0 0 10px rgba(123, 239, 255, 0.5));
        }
        
        .astronaut-body {
            position: absolute;
            width: 90px;
            height: 110px;
            background: linear-gradient(145deg, #4a5fc1, #2a3a8f);
            border-radius: 45px 45px 35px 35px;
            top: 60px;
            left: 25px;
            box-shadow: 
                0 5px 15px rgba(0, 0, 0, 0.4),
                inset 0 -5px 10px rgba(255, 255, 255, 0.1);
        }
        
        .astronaut-helmet {
            position: absolute;
            width: 100px;
            height: 100px;
            background: radial-gradient(circle at 35% 35%, #7befff, #4a5fc1);
            border-radius: 50%;
            top: 20px;
            left: 20px;
            box-shadow: 
                inset 0 0 25px rgba(123, 239, 255, 0.6),
                0 5px 15px rgba(0, 0, 0, 0.3);
            border: 0.1px solid rgba(255, 255, 255, 0.2);
        }
        
        .astronaut-visor {
            position: absolute;
            width: 60px;
            height: 45px;
            background: linear-gradient(135deg, rgba(123, 239, 255, 0.4), rgba(255, 255, 255, 0.2));
            border-radius: 50%;
            top: 35px;
            left: 20px;
            box-shadow: 
                inset 0 0 15px rgba(123, 239, 255, 0.5),
                0 0 20px rgba(123, 239, 255, 0.3);
            backdrop-filter: blur(5px);
        }
        
        .astronaut-light {
            position: absolute;
            width: 8px;
            height: 8px;
            background: #ffd166;
            border-radius: 50%;
            top: 45px;
            right: 25px;
            box-shadow: 0 0 10px #ffd166;
            animation: lightBlink 0.8s infinite alternate;
        }
        
        .astronaut-backpack {
            position: absolute;
            width: 45px;
            height: 65px;
            background: linear-gradient(145deg, #3a506b, #2a3a8f);
            border-radius: 20px;
            top: 80px;
            right: 10px;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.3);
        }
        
        .astronaut-antenna {
            position: absolute;
            width: 3px;
            height: 25px;
            background: linear-gradient(to top, #7befff, #ffd166);
            top: 10px;
            left: 50%;
            transform: translateX(-50%);
            border-radius: 2px;
        }
        
        .astronaut-antenna-tip {
            position: absolute;
            width: 8px;
            height: 8px;
            background: #ffd166;
            border-radius: 50%;
            top: 0;
            left: 50%;
            transform: translateX(-50%);
            box-shadow: 0 0 8px #ffd166;
            animation: lightBlink 1.2s infinite alternate;
        }
        
        .planet {
            position: absolute;
            border-radius: 50%;
            box-shadow: 0 0 30px rgba(255, 94, 0, 0.5);
            filter: drop-shadow(0 0 10px rgba(255, 255, 255, 0.2));
        }
        
        .planet1 {
            width: 60px;
            height: 60px;
            background: radial-gradient(circle at 30% 30%, #ffd166, #ff9a00);
            top: 50px;
            right: 20px;
            animation: orbit1 25s linear infinite;
        }
        
        .planet2 {
            width: 40px;
            height: 40px;
            background: radial-gradient(circle at 30% 30%, #00b4d8, #0077b6);
            bottom: 70px;
            left: 15px;
            animation: orbit2 30s linear infinite reverse;
            box-shadow: 0 0 25px rgba(0, 180, 216, 0.5);
        }
        
        .planet3 {
            width: 30px;
            height: 30px;
            background: radial-gradient(circle at 30% 30%, #9d4edd, #560bad);
            top: 120px;
            left: 30px;
            animation: orbit3 35s linear infinite;
            box-shadow: 0 0 20px rgba(157, 78, 221, 0.5);
        }
        
        .meteor {
            position: absolute;
            width: 2px;
            height: 2px;
            background: white;
            border-radius: 50%;
            box-shadow: 0 0 8px white;
            animation: meteorFall linear infinite;
        }
        
        @keyframes meteorFall {
            0% {
                opacity: 0;
                transform: translate(0, 0);
            }
            10% {
                opacity: 1;
            }
            90% {
                opacity: 1;
            }
            100% {
                opacity: 0;
                transform: translate(500px, 500px);
            }
        }

        .santa-gif-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 150%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
        }

        .santa-gif {
            position: absolute;
            width: 200px;
            top: 20%;
            left: -200px;
            animation: santaFly 30s linear infinite;
        }

        @keyframes santaFly {
            0% {
                left: -200px;
                top: 20%;
            }
            100% {
                left: 100%;
                top: 20%;
            }
        }

        .astronaut-gif {
            position: absolute;
            width: 100px;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            animation: float 6s ease-in-out infinite;
            filter: drop-shadow(0 0 10px rgba(123, 239, 255, 0.5));
            z-index: 2;
        }

        .floating-astronaut {
            position: absolute;
            width: 90px;
            top: 25%;
            left: -70px;
            z-index: -1;
            pointer-events: none;
            animation: astronautFloatAcross 15s linear infinite;
            filter: drop-shadow(0 0 8px rgba(123, 239, 255, 0.7));
        }

        .astronaut-gif {
            width: 150%;
            height: auto;
            display: block;
        }

        @keyframes astronautFloatAcross {
            0% {
                left: -70px;
                top: 25%;
                transform: translateY(0) rotate(0deg);
            }
            25% {
                top: 22%;
                transform: translateY(-10px) rotate(5deg);
            }
            50% {
                top: 28%;
                transform: translateY(5px) rotate(-5deg);
            }
            75% {
                top: 23%;
                transform: translateY(-5px) rotate(2deg);
            }
            100% {
                left: calc(100% + 70px);
                top: 25%;
                transform: translateY(0) rotate(0deg);
            }
        }

        .calendar-container {
            display: none !important;
        }
        
        .weather-container {
            background: rgba(28, 37, 65, 0.8);
            border-radius: 12px;
            padding: 15px;
            margin-bottom: 20px;
            border: 0.1px solid;
            border-image: linear-gradient(45deg, 
                #ff0000, #ff8000, #ffff00, #00ff00, 
                #00ffff, #0080ff, #0000ff, #8000ff) 1;
            position: relative;
            animation: borderRainbow 8s linear infinite;
        }
        
        .weather-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 10px;
            padding-bottom: 8px;
            border-bottom: 1px solid rgba(123, 239, 255, 0.2);
        }
        
        .weather-title {
            color: #7befff;
            font-size: 16px;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .weather-location {
            font-size: 12px;
            color: rgba(255, 255, 255, 0.7);
            cursor: pointer;
            transition: color 0.3s;
        }
        
        .weather-location:hover {
            color: #ffd166;
        }
        
        .weather-main {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 10px;
        }
        
        .weather-temp {
            font-size: 28px;
            font-weight: bold;
            color: #ffd166;
            display: flex;
            align-items: center;
        }
        
        .weather-icon {
            font-size: 36px;
        }
        
        .weather-description {
            font-size: 14px;
            color: rgba(255, 255, 255, 0.9);
            margin-bottom: 5px;
        }
        
        .weather-details {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 8px;
            font-size: 12px;
            color: rgba(255, 255, 255, 0.7);
        }

        /* ==================== 搜索栏内部背景 - 马年GIF优化 ==================== */
        .search-row-background {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            overflow: hidden;
            pointer-events: none;
            opacity: 0.9;
            background: linear-gradient(45deg, rgba(28, 37, 65, 0.1), rgba(40, 53, 147, 0.1));
        }
        
        /* 彩色聚光灯效果 - 彩虹渐变 */
        .search-row-background::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 0;
            width: 100%;
            height: 140px;
            background: radial-gradient(
                ellipse at center,
                rgba(255, 0, 0, 0.2) 0%,
                rgba(255, 165, 0, 0.18) 15%,
                rgba(255, 255, 0, 0.16) 30%,
                rgba(0, 128, 0, 0.14) 45%,
                rgba(0, 0, 255, 0.12) 60%,
                rgba(75, 0, 130, 0.10) 75%,
                rgba(238, 130, 238, 0.08) 90%,
                transparent 100%
            );
            transform: translateY(-50%);
            pointer-events: none;
            z-index: 0;
            filter: blur(15px);
            animation: colorfulSpotlight 8s ease-in-out infinite;
        }
        
        @keyframes colorfulSpotlight {
            0%, 100% {
                opacity: 0.7;
                transform: translateY(-50%) scale(1);
                filter: blur(15px) hue-rotate(0deg);
            }
            25% {
                opacity: 0.9;
                transform: translateY(-50%) scale(1.05);
                filter: blur(18px) hue-rotate(90deg);
            }
            50% {
                opacity: 0.8;
                transform: translateY(-50%) scale(1.1);
                filter: blur(20px) hue-rotate(180deg);
            }
            75% {
                opacity: 0.9;
                transform: translateY(-50%) scale(1.05);
                filter: blur(18px) hue-rotate(270deg);
            }
        }
        
        /* 马年GIF - 调大并添加彩虹效果 */
        .horse-gif-bg {
            position: absolute;
            width: 130px; /* 进一步调大的马 */
            height: 130px;
            object-fit: contain;
            filter: brightness(1.6) contrast(1.4) drop-shadow(0 0 20px rgba(255, 255, 255, 0.8));
            animation: horseWalkRightToLeft 45s linear infinite;
            opacity: 1; /* 最高的不透明度 */
            top: 50%;
            transform: translateY(-50%);
            z-index: 2;
            mix-blend-mode: screen; /* 添加混合模式让马融入彩色背景 */
        }
        
        /* 为马添加强烈的聚光灯效果 */
        .horse-gif-bg::after {
            content: '';
            position: absolute;
            top: -30px;
            left: -30px;
            right: -30px;
            bottom: -30px;
            background: 
                radial-gradient(
                    circle at center,
                    rgba(255, 255, 255, 0.9) 0%,
                    rgba(255, 215, 0, 0.8) 20%,
                    rgba(255, 165, 0, 0.6) 40%,
                    rgba(255, 140, 0, 0.3) 60%,
                    rgba(255, 69, 0, 0.1) 80%,
                    transparent 100%
                );
            border-radius: 50%;
            filter: blur(35px);
            z-index: -1;
            opacity: 1.0;
            animation: spotlightMove 2s ease-in-out infinite alternate;
        }
        
        @keyframes spotlightMove {
            0% {
                opacity: 0.8;
                filter: blur(30px);
                transform: scale(1);
                box-shadow: 0 0 50px rgba(255, 215, 0, 0.8), 0 0 100px rgba(255, 140, 0, 0.6);
            }
            100% {
                opacity: 1.0;
                filter: blur(40px);
                transform: scale(1.2);
                box-shadow: 0 0 80px rgba(255, 215, 0, 1), 0 0 150px rgba(255, 140, 0, 0.8);
            }
        }
        
        /* 马从右向左的慢速动画 */
        @keyframes horseWalkRightToLeft {
            0% {
                left: 100%;
            }
            100% {
                left: -130px;
            }
        }

        // ==================== 简单准确的农历计算 ====================
        function getAccurateLunarDate(year, month, day) {
            // 2025年准确的农历数据表
            const lunarData2025 = {
                '2025-01-01': '甲辰年腊月初二',
                '2025-01-29': '甲辰年腊月三十',
                '2025-01-30': '乙巳年正月初一',

                '2025-03-01': '乙巳年二月初二',
                '2025-03-10': '乙巳年二月十一',
                '2025-03-20': '乙巳年二月廿一',
                '2025-03-30': '乙巳年三月初一',
                
                '2025-04-01': '乙巳年三月初三',
                '2025-04-10': '乙巳年三月十二',
                '2025-04-20': '乙巳年三月廿二',
                '2025-04-30': '乙巳年四月初三',
                
                '2025-05-01': '乙巳年四月初四',
                '2025-05-10': '乙巳年四月十三',
                '2025-05-20': '乙巳年四月廿三',
                '2025-05-30': '乙巳年五月初三',
                
                '2025-06-01': '乙巳年五月初五',
                '2025-06-10': '乙巳年五月十四',
                '2025-06-20': '乙巳年五月廿四',
                '2025-06-30': '乙巳年闰五月初四',
                
                '2025-07-01': '乙巳年闰五月初五',
                '2025-07-10': '乙巳年闰五月十四',
                '2025-07-20': '乙巳年闰五月廿四',
                '2025-07-30': '乙巳年六月初五',
                
                '2025-08-01': '乙巳年六月初七',
                '2025-08-10': '乙巳年六月十六',
                '2025-08-20': '乙巳年六月廿六',
                '2025-08-30': '乙巳年七月初七',
                
                '2025-09-01': '乙巳年七月初九',
                '2025-09-10': '乙巳年七月十八',
                '2025-09-20': '乙巳年七月廿八',
                '2025-09-30': '乙巳年八月初八',
                
                '2025-10-01': '乙巳年八月初九',
                '2025-10-10': '乙巳年八月十八',
                '2025-10-20': '乙巳年八月廿八',
                '2025-10-30': '乙巳年九月初九',
                
                '2025-11-01': '乙巳年九月十一',
                '2025-11-10': '乙巳年九月二十',
                '2025-11-20': '乙巳年九月三十',
                '2025-11-30': '乙巳年十月初十',
                
                '2025-12-01': '乙巳年十月十一',
                '2025-12-10': '乙巳年十月二十',
                '2025-12-20': '乙巳年十月三十',
                '2025-12-25': '乙巳年冬月初五',
                '2025-12-30': '乙巳年冬月初十',
                '2025-12-31': '乙巳年冬月十一'
            };

            const dateStr = `${year}-${month.toString().padStart(2, '0')}-${day.toString().padStart(2, '0')}`;
            
            if (lunarData2025[dateStr]) {
                return lunarData2025[dateStr];
            }
            
            const dateObj = new Date(year, month - 1, day);
            
            const springFestival2025 = new Date(2025, 0, 29);
            const diffDays = Math.floor((dateObj - springFestival2025) / (1000 * 60 * 60 * 24));
            
            if (diffDays >= 0) {
                const lunarMonthNames = ["正月", "二月", "三月", "四月", "五月", "六月", 
                                       "七月", "八月", "九月", "十月", "冬月", "腊月"];
                const lunarDayNames = ["初一", "初二", "初三", "初四", "初五", "初六", "初七", "初八", "初九", "初十",
                                     "十一", "十二", "十三", "十四", "十五", "十六", "十七", "十八", "十九", "二十",
                                     "廿一", "廿二", "廿三", "廿四", "廿五", "廿六", "廿七", "廿八", "廿九", "三十"];
                
                const lunarMonthDays = [
                    30, 29, 30, 29, 30, 29, 30, 29, 30, 29,
                    30,
                    30, 29, 30, 29, 30, 29, 30, 29, 30, 29
                ];
                
                let remainingDays = diffDays;
                let lunarMonth = 0;
                
                while (remainingDays >= lunarMonthDays[lunarMonth]) {
                    remainingDays -= lunarMonthDays[lunarMonth];
                    lunarMonth++;
                }
                
                const lunarDay = remainingDays + 1;
                
                let monthDisplay = "";
                if (lunarMonth === 5) {
                    monthDisplay = "闰六月";
                } else if (lunarMonth > 5) {
                    monthDisplay = lunarMonthNames[lunarMonth - 1];
                } else {
                    monthDisplay = lunarMonthNames[lunarMonth];
                }
                
                return `乙巳年${monthDisplay}${lunarDayNames[lunarDay - 1]}`;
            } else {
                return "甲辰年腊月";
            }
        }

        // 生成固定日历模块
        function generateFixedCalendarModule(year, month, date) {
            const now = new Date(year, month, date);
            const firstDay = new Date(year, month, 1);
            const lastDay = new Date(year, month + 1, 0);
            const daysInMonth = lastDay.getDate();
            const firstDayIndex = firstDay.getDay();
            
            document.getElementById('calendarModuleDateFixed').textContent = `${month + 1}月${date}日`;
            
            const lunarDate = getAccurateLunarDate(year, month + 1, date);
            document.getElementById('calendarModuleLunarFixed').textContent = `农历${lunarDate}`;
            
            const calendarGrid = document.getElementById('calendarModuleGridFixed');
            calendarGrid.innerHTML = '';
            
            // 添加星期标题
            const weekDays = ['日', '一', '二', '三', '四', '五', '六'];
            for (let i = 0; i < 7; i++) {
                const dayElement = document.createElement('div');
                dayElement.className = 'calendar-module-date-cell-fixed';
                dayElement.textContent = weekDays[i];
                // 为星期天特别标记
                if (i === 0) {
                    dayElement.style.color = '#ff9a00'; // 红色表示星期天
                }
                calendarGrid.appendChild(dayElement);
            }
            
            const today = new Date();
            
            // 生成日历
            for (let i = 0; i < firstDayIndex; i++) {
                const dateElement = document.createElement('div');
                dateElement.className = 'calendar-module-date-cell-fixed';
                dateElement.textContent = '';
                calendarGrid.appendChild(dateElement);
            }
            
            for (let day = 1; day <= daysInMonth; day++) {
                const dateElement = document.createElement('div');
                dateElement.className = 'calendar-module-date-cell-fixed';
                dateElement.textContent = day;
                
                if (year === today.getFullYear() && 
                    month === today.getMonth() && 
                    day === today.getDate()) {
                    dateElement.classList.add('today');
                }
                
                calendarGrid.appendChild(dateElement);
            }
            
            const totalCells = 42;
            const remainingCells = totalCells - (firstDayIndex + daysInMonth);
            for (let day = 1; day <= remainingCells; day++) {
                const dateElement = document.createElement('div');
                dateElement.className = 'calendar-module-date-cell-fixed';
                dateElement.textContent = '';
                calendarGrid.appendChild(dateElement);
            }
        }

        // 获取和风天气数据
        async function fetchHeWeatherData() {
            if (!weatherApiKey) {
                throw new Error('未配置API密钥');
            }
            
            const encodedCity = encodeURIComponent(currentWeatherCity);
            const url = `https://devapi.qweather.com/v7/weather/now?location=${encodedCity}&key=${weatherApiKey}`;
            
            const response = await fetch(url);
            if (!response.ok) {
                throw new Error(`API请求失败: ${response.status}`);
            }
            
            const data = await response.json();
            
            if (data.code !== '200') {
                throw new Error(`API错误: ${data.code}`);
            }
            
            return {
                temperature: data.now.temp,
                condition: data.now.text,
                humidity: data.now.humidity,
                windSpeed: data.now.windSpeed,
                feelsLike: data.now.feelsLike,
                icon: getWeatherIconFromCode(data.now.icon)
            };
        }

        // 获取免费天气数据
        async function fetchFreeWeatherData() {
            const geocodingUrl = `https://geocoding-api.open-meteo.com/v1/search?name=${encodeURIComponent(currentWeatherCity)}&count=1&language=zh&format=json`;
            
            const geoResponse = await fetch(geocodingUrl);
            if (!geoResponse.ok) {
                throw new Error('地理位置查询失败');
            }
            
            const geoData = await geoResponse.json();
            
            if (!geoData.results || geoData.results.length === 0) {
                throw new Error('未找到城市信息');
            }
            
            const location = geoData.results[0];
            const latitude = location.latitude;
            const longitude = location.longitude;
            const cityName = location.name;
            
            currentWeatherCity = cityName;
            
            const weatherUrl = `https://api.open-meteo.com/v1/forecast?latitude=${latitude}&longitude=${longitude}&current_weather=true&hourly=temperature_2m,relativehumidity_2m,windspeed_10m&timezone=auto`;
            
            const weatherResponse = await fetch(weatherUrl);
            if (!weatherResponse.ok) {
                throw new Error('天气数据获取失败');
            }
            
            const weatherData = await weatherResponse.json();
            
            const current = weatherData.current_weather;
            const hourly = weatherData.hourly;
            
            const currentTime = new Date(current.time);
            let tempIndex = -1;
            
            for (let i = 0; i < hourly.time.length; i++) {
                const hourTime = new Date(hourly.time[i]);
                if (hourTime.getHours() === currentTime.getHours()) {
                    tempIndex = i;
                    break;
                }
            }
            
            const humidity = tempIndex >= 0 ? hourly.relativehumidity_2m[tempIndex] : 50;
            const windSpeed = current.windspeed;
            const temperature = current.temperature;
            const feelsLike = calculateRealFeelsLike(temperature, humidity, windSpeed);
            const weatherCode = current.weathercode;
            const { condition, icon } = getWeatherFromCode(weatherCode);
            
            return {
                temperature: temperature,
                condition: condition,
                humidity: humidity,
                windSpeed: windSpeed,
                feelsLike: feelsLike,
                icon: icon
            };
        }

        // 计算真实体感温度
        function calculateRealFeelsLike(temp, humidity, windSpeed) {
            let feelsLike = temp;
            
            if (temp >= 25) {
                feelsLike += (humidity - 50) * 0.05;
            }
            
            if (temp < 10 && windSpeed > 5) {
                const windChill = 13.12 + 0.6215 * temp - 11.37 * Math.pow(windSpeed, 0.16) + 0.3965 * temp * Math.pow(windSpeed, 0.16);
                feelsLike = Math.min(feelsLike, windChill);
            }
            
            return Math.round(feelsLike * 10) / 10;
        }

        // 解析公告内容
        function parseAnnouncementContent(content) {
            const announcements = [];
            const lines = content.split('\n');
            
            for (const line of lines) {
                const trimmedLine = line.trim();
                if (!trimmedLine) continue;
                
                let type = "info";
                let message = trimmedLine;
                
                if (trimmedLine.startsWith('[INFO]') || trimmedLine.startsWith('[info]')) {
                    type = "info";
                    message = trimmedLine.substring(6).trim();
                } else if (trimmedLine.startsWith('[SUCCESS]') || trimmedLine.startsWith('[success]')) {
                    type = "success";
                    message = trimmedLine.substring(9).trim();
                } else if (trimmedLine.startsWith('[WARNING]') || trimmedLine.startsWith('[warning]')) {
                    type = "warning";
                    message = trimmedLine.substring(9).trim();
                } else if (trimmedLine.startsWith('[ERROR]') || trimmedLine.startsWith('[error]')) {
                    type = "error";
                    message = trimmedLine.substring(7).trim();
                } else if (trimmedLine.startsWith('[更新]')) {
                    type = "success";
                    message = trimmedLine.substring(4).trim();
                } else if (trimmedLine.startsWith('[重要]')) {
                    type = "warning";
                    message = trimmedLine.substring(4).trim();
                }
                
                message = message.replace(/^[•\-*>]\s*/, '');
                
                if (message) {
                    announcements.push({
                        message: message,
                        type: type
                    });
                }
            }
            
            return announcements;
        }

        }

        // 从目录加载数据
        async function loadFromDirectory(index) {
            const directory = DATA_DIRECTORIES[index];
            currentDataSource = directory;
            
            document.querySelectorAll('.directory-item').forEach((item, i) => {
                item.classList.toggle('active', i === index);
            });
            
            updateStatus(`正在从 ${directory.name} 加载数据...`, 'default');
            
            try {
                const controller = new AbortController();
                const timeoutId = setTimeout(() => controller.abort(), 5000);
                
                const timestamp = Date.now();
                const dataUrl = directory.url.includes('?') 
                    ? `${directory.url}&t=${timestamp}` 
                    : `${directory.url}?t=${timestamp}`;
                
                const response = await fetch(dataUrl, {
                    signal: controller.signal
                });
                
                clearTimeout(timeoutId);
                
                if (response.ok) {
                    const cloudData = await response.json();
                    imageData = cloudData;
                    
                    updateStatus(`✅ 已从 ${directory.name} 加载数据 (${imageData.length} 张图片)`, 'success');
                    updateDisplay(`✅ 使用 ${directory.name} 数据 (共 ${imageData.length} 张图片)`);
                } else {
                    throw new Error(`服务器返回 ${response.status} 错误`);
                }
            } catch (error) {
                console.error('数据加载失败:', error);
                
                if (error.name === 'AbortError') {
                    updateStatus(`⏰ ${directory.name} 加载超时，尝试备用方案`, 'warning');
                } else {
                    updateStatus(`❌ ${directory.name} 加载失败: ${error.message}`, 'error');
                }
                
                if (directory.url === "./images.json") {
                    updateStatus('正在尝试使用示例数据...', 'warning');
                    imageData = SAMPLE_DATA;
                    
                    updateStatus(`✅ 已使用示例数据 (${imageData.length} 张图片)`, 'success');
                    updateDisplay(`✅ 使用示例数据 (共 ${imageData.length} 张图片)`);
                }
            }
        }

        // 更新状态显示
        function updateStatus(message, type = 'default') {
            const statusEl = document.getElementById('updateStatus');
            if (statusEl) {
                statusEl.innerHTML = '<span class="loading-spinner"></span>' + message;
                
                if (type === 'success') {
                    statusEl.style.background = 'rgba(46, 204, 113, 0.2)';
                    statusEl.style.borderLeftColor = '#2ecc71';
                } else if (type === 'warning') {
                    statusEl.style.background = 'rgba(243, 156, 18, 0.2)';
                    statusEl.style.borderLeftColor = '#f39c12';
                } else if (type === 'error') {
                    statusEl.style.background = 'rgba(231, 76, 60, 0.2)';
                    statusEl.style.borderLeftColor = '#e74c3c';
                } else {
                    statusEl.style.background = 'rgba(28, 37, 65, 0.8)';
                    statusEl.style.borderLeftColor = '#5bc0be';
                }
            }
        }

        // 更新显示
        function updateDisplay(message) {
            document.getElementById('resultsInfo').innerHTML = '<p>' + message + '</p>';
            document.getElementById('results').innerHTML = `
                <div class="status-info">
                    <p>数据加载成功！</p>
                    <p>请选择搜索类型并输入关键词进行搜索</p>
            </div>
            `;
        }

        // 电脑端搜索函数
        function searchDesktop() {
            const query = document.getElementById('searchInputDesktop').value.toLowerCase();
            if (!query) {
                document.getElementById('results').innerHTML = `
                    <div class="status-info">
                        <p>请输入搜索关键词</p>
                    </div>
                `;
                document.getElementById('resultsInfo').innerHTML = '';
                return;
            }
            
            // 同步到移动端输入框
            const mobileInput = document.getElementById('searchInputMobile');
            if (mobileInput) mobileInput.value = query;
            
            performSearch(query);
        }

        // 移动端搜索函数
        function searchMobile() {
            const query = document.getElementById('searchInputMobile').value.toLowerCase();
            if (!query) {
                document.getElementById('results').innerHTML = `
                    <div class="status-info">
                        <p>请输入搜索关键词</p>
                    </div>
                `;
                document.getElementById('resultsInfo').innerHTML = '';
                return;
            }
            
            // 同步到电脑端输入框
            const desktopInput = document.getElementById('searchInputDesktop');
            if (desktopInput) desktopInput.value = query;
            
            performSearch(query);
        }

        // 执行搜索
        function performSearch(query) {
            if (currentSearchType === 'image') {
                searchImages(query);
            } else {
                searchWeights(query);
            }
            
            setTimeout(function() {
                scrollToResults();
            }, 150);
        }

        // 滚动到结果区域
        function scrollToResults() {
            const resultsContainer = document.getElementById('results');
            if (!resultsContainer) return;
            
            const containerRect = resultsContainer.getBoundingClientRect();
            const isMobile = window.innerWidth <= 768;
            const offset = isMobile ? 80 : 20;
            
            resultsContainer.scrollIntoView({
                behavior: 'smooth',
                block: 'start'
            });
            
            setTimeout(function() {
                const currentScroll = window.pageYOffset || document.documentElement.scrollTop;
                const targetPosition = containerRect.top + window.pageYOffset - offset;
                
                if (Math.abs(currentScroll - targetPosition) > 50) {
                    window.scrollTo({
                        top: targetPosition,
                        behavior: 'smooth'
                    });
                }
            }, 300);
        }

        // 搜索图片
        function searchImages(query) {
            if (!imageData || imageData.length === 0) {
                alert('请先选择数据源');
                return;
            }
            
            const results = imageData.filter(img => 
                img.code.toLowerCase().includes(query) || 
                (img.description && img.description.toLowerCase().includes(query)) ||
                (img.tags && img.tags.some(tag => tag.toLowerCase().includes(query)))
            );
            
            document.getElementById('resultsInfo').innerHTML = 
                `<p>找到 ${results.length} 个图片结果 (共 ${imageData.length} 张图片)</p>`;
                
            displayImages(results, query);
        }

        // 显示图片结果
        function displayImages(images, query) {
            const resultsContainer = document.getElementById('results');
            
            if (images.length === 0) {
                resultsContainer.innerHTML = `
                    <div class="status-info">
                        <p>没有找到与 "<strong>${query}</strong>" 匹配的图片</p>
                        <p>数据库中共有 ${imageData.length} 张图片</p>
                    </div>
                `;
                return;
            }
            
            resultsContainer.innerHTML = `
                <div class="image-results">
                    ${images.map(img => `
                        <div class="image-card" onclick="openImageModal('${img.url}', '${img.code}', '${img.description || ''}')">
                            <div class="image-wrapper">
                                <img src="${img.url}" alt="${img.code}" 
                                     id="img-${img.code}"
                                     onerror="handleImageError(this, '${img.code}')"
                                     loading="lazy"
                                     data-url="${img.url}"
                                     data-code="${img.code}">
                            </div>
                            <div class="image-info">
                                <div class="image-code">${img.code}</div>
                            </div>
                        </div>
                    `).join('')}
                </div>
            `;
        }

        // 图片错误处理
        function handleImageError(imgElement, code) {
            console.log(`图片加载失败: ${code} - ${imgElement.src}`);
            imgElement.src = 'data:image/svg+xml;base64,PHN2ZyB3aWR0aD0iMzAwIiBoZWlnaHQ9IjIwMCIgeG1sbnM9Imh0dHA6Ly93d3cudzMub3JnLzIwMDAvc3ZnIj48cmVjdCB3aWR0aD0iMTAwJSIgaGVpZ2h0PSIxMDAlIiBmaWxsPSIjMWMyNTQxIi8+PHRleHQgeD0iNTAlIiB5PSI1MCUiIGZvbnQtZmFtaWx5PSJBcmlhbCwgc2Fucy1zZXJpZiIgZm9udC1zaXplPSIxNCIgZmlsbD0iIzViYzBiZSIgdGV4dC1hbmNob3I9Im1pZGRsZSIgZHk9Ii4zZW0iPkltYWdlIEVycm9yPC90ZXh0Pjwvc3ZnPg==';
            imgElement.alt = '图片加载失败';
        }

        // 修改模态框
        function openImageModal(imageUrl, code, description = '') {
            const modal = document.getElementById('imageModal');
            
            modal.innerHTML = `
                <button class="modal-close" onclick="closeModal()">×</button>
                <div class="modal-content">
                    <div class="modal-image-container" style="padding: 0;">
                        <img id="modalImage" src="${imageUrl}" alt="${code}" 
                             style="width: 100%; height: 100%; object-fit: contain; cursor: default;">
                    </div>
                </div>
            `;
            
            modal.classList.add('active');
            document.addEventListener('keydown', handleModalKeydown);
        }

        // 模态框键盘事件处理
        function handleModalKeydown(e) {
            if (e.key === 'Escape') {
                closeModal();
            }
        }

        // 关闭模态框
        function closeModal() {
            const modal = document.getElementById('imageModal');
            modal.classList.remove('active');
            document.removeEventListener('keydown', handleModalKeydown);
        }

        // 搜索重量
        function searchWeights(query) {
            const results = [];
            
            for (const [code, specs] of Object.entries(weightData)) {
                if (code.toLowerCase().includes(query)) {
                    results.push({ code, specs });
                }
            }
            
            document.getElementById('resultsInfo').innerHTML = 
                `<p>找到 ${results.length} 个重量结果 (共 ${Object.keys(weightData).length} 个款式)</p>`;
                
            displayWeights(results, query);
        }

        // 显示重量结果
        function displayWeights(results, query) {
            const resultsContainer = document.getElementById('results');
            
            if (results.length === 0) {
                resultsContainer.innerHTML = `
                    <div class="status-info">
                        <p>没有找到与 "<strong>${query}</strong>" 匹配的重量数据</p>
                        <p>重量数据库中共有 ${Object.keys(weightData).length} 个款式</p>
                    </div>
                `;
                return;
            }
            
            resultsContainer.innerHTML = `
                <div class="weight-results">
                    ${results.map(item => {
                        const { code, specs } = item;
                        const weightList = Object.entries(specs).map(([spec, weight]) => 
                            `${spec}: ${weight}`
                        ).join('  ');
                        
                        return `
                        <div class="weight-card">
                            <div class="weight-header">
                                <span>${code}</span>
                                <button onclick="copyWeightData('${code}')" style="background: rgba(255,255,255,0.2); color: white; border: 0.1px solid white; border-radius: 4px; padding: 6px 12px; cursor: pointer; font-size: 12px; display: flex; align-items: center; gap: 4px;">
                                    <img src="https://jxy-ai-oss.juxieyun.com/assets/6/assistant/07a5bc1e4a884cd0b06434d46ae0f452/chat_bot/file-1769649686685.gif" 
                                         alt="马" 
                                         style="width: 12px; height: 12px;">
                                    📋复制整款
                                </button>
                            </div>
                            <div class="weight-content">
                                <div class="weight-specs">
                                    ${Object.entries(specs).map(([spec, weight]) => `
                                        <div class="weight-spec-item">
                                            <div class="weight-spec-name">${spec}</div>
                                            <div class="weight-spec-value">${weight}</div>
                                        </div>
                                    `).join('')}
                                </div>
                                <div style="margin-top: 10px; padding: 8px; background: rgba(91, 192, 190, 0.2); border-radius: 4px; font-size: 0.8rem; color: #7befff;">
                                    <strong>完整重量信息:</strong> ${weightList}
                                </div>
                                <button class="copy-all-btn" onclick="copyWeightData('${code}')" style="display: flex; align-items: center; justify-content: center; gap: 6px;">
                                    <img src="https://jxy-ai-oss.juxieyun.com/assets/6/assistant/07a5bc1e4a884cd0b06434d46ae0f452/chat_bot/file-1769649686685.gif" 
                                         alt="马" 
                                         style="width: 14px; height: 14px;">
                                    复制整款重量数据
                                </button>
                            </div>
                        </div>
                        `;
                    }).join('')}
                </div>
            `;
        }

        // 复制重量数据
        function copyWeightData(code) {
            const specs = weightData[code];
            if (!specs) return;
            
            const weightList = Object.entries(specs).map(([spec, weight]) => 
                `${spec}: ${weight}`
            ).join('  ');
            
            const textToCopy = `${code}克重 ${weightList}`;
            
            navigator.clipboard.writeText(textToCopy).then(() => {
                showCopyNotification(`✅ 已复制 ${code} 的重量数据`);
            }).catch(err => {
                const textArea = document.createElement('textarea');
                textArea.value = textToCopy;
                document.body.appendChild(textArea);
                textArea.select();
                document.execCommand('copy');
                document.body.removeChild(textArea);
                showCopyNotification(`✅ 已复制 ${code} 的重量数据`); showCopyNotification(`✅ 已复制 ${code} 的重量数据`);
            });
        }

        // 通用复制函数
        function copyToClipboard(text, type = '内容') {
            navigator.clipboard.writeText(text).then(() => {
                showCopyNotification(`✅ 已复制${type}: ${text.length > 30 ? text.substring(0, 30) + '...' : text}`);
            }).catch(err => {
                const textArea = document.createElement('textarea');
                textArea.value = text;
                document.body.appendChild(textArea);
                textArea.select();
                document.execCommand('copy');
                document.body.removeChild(textArea);
                showCopyNotification(`✅ 已复制${type}: ${text.length > 30 ? text.substring(0, 30) + '...' : text}`);
            });
        }

        // 回车键搜索 - 为两个输入框都添加
        document.addEventListener('DOMContentLoaded', function() {
            const desktopInput = document.getElementById('searchInputDesktop');
            const mobileInput = document.getElementById('searchInputMobile');
            
            if (desktopInput) {
                desktopInput.addEventListener('keypress', function(e) {
                    if (e.key === 'Enter') {
                        searchDesktop();
                    }
                });
            }
            
            if (mobileInput) {
                mobileInput.addEventListener('keypress', function(e) {
                    if (e.key === 'Enter') {
                        searchMobile();
                    }
                });
            }
        });

        // 页面加载时初始化
        initialize();
    </script>
</body>
