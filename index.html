<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes">
    <title>尺寸表搜索 · 横竖屏适配版</title>
    <link rel="icon" type="image/x-icon" href="favicon.ico">
    <style>
        /* ===== 全局 & 樱花 ===== */
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Segoe UI', sans-serif;
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
            background: linear-gradient(135deg, #fff0f5 0%, #e8f5e9 50%, #f1f8e9 100%);
            color: #333;
            min-height: 100vh;
            position: relative;
            overflow-x: hidden;
        }
        #sakura {
            position: fixed; top:0; left:0; width:100%; height:100%; z-index:-2; pointer-events:none;
        }
        .sakura-petal {
            position: absolute; background: radial-gradient(circle, #ffb7b2, #ff9eb0);
            border-radius: 150% 0 150% 0; animation: sakuraFall linear infinite;
        }
        @keyframes sakuraFall {
            0% { transform: translate(0, -10vh) rotate(0deg); opacity: 1; }
            100% { transform: translate(100px, 110vh) rotate(360deg); opacity: 0; }
        }
        .sakura-decoration { position: fixed; z-index:-1; pointer-events:none; }
        .sakura-tree-left, .sakura-tree-right {
            bottom:-50px; left:-30px; width:200px; height:300px;
            background: radial-gradient(circle at 30% 30%, #ffc1c1 0%, transparent 60%),
                        radial-gradient(circle at 70% 40%, #ffb7b2 0%, transparent 55%),
                        radial-gradient(circle at 50% 60%, #ff9eb0 0%, transparent 50%);
            border-radius: 50% 50% 20% 20%;
            animation: bloom 4s infinite alternate;
        }
        .sakura-tree-right { left:auto; right:-50px; width:250px; height:350px; }
        @keyframes bloom {
            0% { transform: scale(1); filter: drop-shadow(0 0 20px rgba(255,192,203,0.5)); }
            100% { transform: scale(1.1); filter: drop-shadow(0 0 30px rgba(255,192,203,0.8)); }
        }

        /* ===== Fliqlo时钟 ===== */
        .fliqlo-time-display {
            width:100%; height:100%; display:flex; flex-direction:column; justify-content:center;
            align-items:center; background:linear-gradient(135deg,#fff0f5,#e8f5e9); border-radius:12px;
        }
        .fliqlo-clock {
            display:flex; flex-direction:column; align-items:center; gap:10px; width:100%; padding:20px;
        }
        .time-digits {
            display:flex; gap:5px; font-size:4rem; font-weight:300; color:#333; letter-spacing:2px;
            text-shadow:0 2px 5px rgba(255,158,176,0.3); line-height:1; flex-wrap:wrap; justify-content:center;
        }
        .time-colon { opacity:0.7; animation:blink 1s infinite; color:#ff9eb0; margin:0 2px; }
        @keyframes blink { 0%,100%{opacity:0.7}50%{opacity:0.2} }
        .time-separator { width:60%; height:2px; background:linear-gradient(90deg,transparent,#ff9eb0,transparent); margin:5px 0; }
        .date-display { font-size:1.5rem; color:#ff9eb0; margin-top:5px; font-weight:500; letter-spacing:1px; }

        /* ===== 右侧飞船日历 (仅桌面≥1025px显示) ===== */
        .spaceship-weather-calendar {
            position: fixed; right:20px; top:50%; transform:translateY(-50%);
            width:300px; z-index:10; display:none; animation:floatInPlace 6s infinite;
        }
        @keyframes floatInPlace { 0%,100%{transform:translateY(-50%)}50%{transform:translateY(-53%)} }
        .main-spaceship-fixed { width:100%; height:120px; margin-bottom:10px; }
        .spaceship-gif-fixed { width:100%; height:100%; object-fit:contain; filter:drop-shadow(0 0 15px #5bc0be); }
        .connection-cable-fixed { width:4px; height:25px; background:linear-gradient(to bottom, #7befff, #5bc0be); margin:0 auto; }
        .modules-container { position:relative; width:100%; }
        .weather-module-fixed, .calendar-module-fixed {
            width:100%; background:rgba(255,240,245,0.95); backdrop-filter:blur(15px);
            border-radius:15px; padding:15px; box-shadow:0 10px 25px rgba(0,0,0,0.1);
            border:1px solid rgba(255,190,176,0.3); margin-bottom:10px;
        }
        .weather-module-header-fixed { display:flex; align-items:center; justify-content:space-between; margin-bottom:10px; }
        .weather-module-title-fixed { color:#ff9eb0; font-size:16px; font-weight:600; display:flex; align-items:center; gap:8px; }
        .weather-module-main-fixed { display:flex; align-items:center; justify-content:space-between; margin-bottom:10px; }
        .weather-module-temp-fixed { font-size:28px; font-weight:bold; color:#ffd166; }
        .weather-module-icon-fixed { font-size:36px; }
        .weather-module-desc-fixed { font-size:14px; text-align:center; margin-bottom:10px; }
        .weather-module-details-fixed { display:grid; grid-template-columns:repeat(3,1fr); gap:8px; font-size:12px; }
        .calendar-module-header-fixed { text-align:center; }
        .calendar-module-title-fixed { color:#ff9eb0; font-size:18px; margin-bottom:10px; display:flex; justify-content:center; gap:8px; }
        .calendar-module-date-fixed { font-size:24px; font-weight:bold; color:#333; margin-bottom:5px; }
        .calendar-module-lunar-fixed { font-size:14px; color:#ffd166; background:rgba(255,209,102,0.1); padding:5px 12px; border-radius:20px; display:inline-block; margin-bottom:10px; }
        .calendar-module-grid-fixed { display:grid; grid-template-columns:repeat(7,1fr); gap:6px; }
        .calendar-module-date-cell-fixed { text-align:center; padding:8px; font-size:12px; border-radius:8px; background:rgba(255,240,245,0.5); border:1px solid rgba(255,190,176,0.1); }
        .calendar-module-date-cell-fixed.today { background:linear-gradient(145deg, #ff9eb0, #ff7eb5); color:white; font-weight:bold; }

        /* 左侧花鸟装饰 (桌面≥1025px显示) */
        .illustration-container { position:fixed; left:20px; top:50%; transform:translateY(-50%); width:200px; height:350px; z-index:0; opacity:0.9; display:none; }
        .astronaut-gif { position:absolute; width:180px; top:50%; left:50%; transform:translate(-50%,-50%); animation:float 6s infinite; filter:drop-shadow(0 0 10px #7befff); z-index:2; }
        @media (min-width:1025px) {
            .spaceship-weather-calendar { display:block; }
            .illustration-container { display:block; }
        }

        /* ===== 主要内容区 ===== */
        .main-content-area { position:relative; z-index:1; width:100%; max-width:1200px; margin:0 auto; padding-top:20px; }
        .announcement-bar {
            background:linear-gradient(90deg,#e3f2fd,#bbdefb); color:#1976d2; padding:8px 30px 8px 15px; border-radius:6px;
            margin-bottom:15px; position:relative; overflow:hidden; min-height:40px; display:flex; align-items:center;
            border:1px solid rgba(187,222,251,0.5); font-size:14px;
        }
        .announcement-content { flex:1; overflow:hidden; height:22px; }
        .announcement-scroll { position:absolute; white-space:nowrap; animation:scrollAnnouncement 20s linear infinite; font-size:13px; }
        @keyframes scrollAnnouncement { 0%{transform:translateX(100%)}100%{transform:translateX(-100%)} }
        .announcement-close { position:absolute; right:8px; top:50%; transform:translateY(-50%); background:rgba(187,222,251,0.5); color:#1976d2; border:none; width:24px; height:24px; border-radius:50%; cursor:pointer; }
        .search-container {
            background:rgba(255,240,245,0.9); padding:20px; border-radius:12px; box-shadow:0 5px 20px rgba(0,0,0,0.1);
            margin-bottom:20px; border-left:5px solid #ff9eb0; backdrop-filter:blur(10px);
        }
        h1 { color:#ff9eb0; margin-bottom:15px; font-size:1.8rem; display:flex; align-items:center; gap:10px; }
        .update-status { background:rgba(28,37,65,0.8); padding:12px; border-radius:8px; margin:15px 0; font-size:14px; border-left:4px solid #5bc0be; color:white; }
        .search-type { display:flex; gap:10px; margin-bottom:15px; }
        .search-type-btn {
            padding:10px 15px; background:rgba(28,37,65,0.8); color:rgba(255,255,255,0.7);
            border:1px solid rgba(123,239,255,0.2); border-radius:6px; cursor:pointer; font-weight:500;
            display:flex; align-items:center; gap:8px;
        }
        .search-type-btn.active { background:linear-gradient(45deg,#5bc0be,#3a506b); color:white; border-color:#5bc0be; }

        /* ===== 搜索栏 (修复输入) ===== */
        .search-controls { display:flex; flex-wrap:wrap; gap:12px; margin-top:20px; }
        .search-input-container { flex:1; min-width:250px; position:relative; }

        /* 电脑端布局 */
        .desktop-search-layout { width:100%; }
        .desktop-search-row {
            display:flex; align-items:center; background:white; border:1px solid rgba(255,190,176,0.3);
            border-radius:8px; overflow:hidden; transition:all 0.3s; height:52px; width:100%;
        }
        .desktop-search-row:focus-within { border-color:#ff9eb0; box-shadow:0 0 0 3px rgba(255,190,176,0.2); }
        .desktop-lion-dance-gif { width:50px; height:50px; flex-shrink:0; border-right:1px solid rgba(255,190,176,0.2); background:rgba(255,240,245,0.9); padding:5px; display:block; }
        .desktop-search-input {
            flex:1; width:100%; padding:14px 16px; background:transparent; border:none;
            font-size:16px; color:#333; outline:none; height:100%;
        }
        .desktop-search-btn {
            display:flex; align-items:center; justify-content:center; background:linear-gradient(45deg,#ff9eb0,#ff7eb5);
            color:white; border:none; padding:0 25px; cursor:pointer; font-size:16px; font-weight:600;
            height:100%; min-width:90px; border-radius:0 8px 8px 0; transition:0.3s;
        }

        /* 移动端布局 (默认隐藏) */
        .mobile-search-layout { display:none; width:100%; flex-direction:column; gap:12px; }
        .mobile-search-row {
            display:flex; align-items:center; background:white; border:1px solid rgba(255,190,176,0.3);
            border-radius:10px; overflow:hidden; height:50px;
        }
        .mobile-lion-dance-gif { width:45px; height:45px; flex-shrink:0; border-right:1px solid rgba(255,190,176,0.2); background:rgba(255,240,245,0.9); padding:4px; }
        .mobile-search-input {
            flex:1; padding:12px 10px; background:transparent; border:none; font-size:16px; color:#333; outline:none; height:100%;
        }
        .mobile-search-btn {
            display:flex; align-items:center; justify-content:center; background:linear-gradient(45deg,#ff9eb0,#ff7eb5);
            color:white; border:none; border-radius:10px; cursor:pointer; font-size:16px; font-weight:600;
            width:100%; height:50px; gap:8px; transition:0.3s;
        }

        /* ===== 时间 & 结果区域 (flex布局) ===== */
        .main-content { display:flex; gap:25px; margin-bottom:25px; width:100%; }
        .time-display-container {
            background:rgba(255,240,245,0.9); padding:20px; border-radius:12px; box-shadow:0 5px 20px rgba(0,0,0,0.1);
            width:35%; min-width:320px; text-align:center; backdrop-filter:blur(10px); border:1px solid rgba(255,190,176,0.2);
            display:flex; flex-direction:column; height:450px;
        }
        .time-wrapper { flex:1; background:linear-gradient(135deg,#fff0f5,#e8f5e9); border-radius:10px; overflow:hidden; width:100%; }
        .results-container {
            background:rgba(255,240,245,0.9); padding:20px; border-radius:12px; box-shadow:0 5px 20px rgba(0,0,0,0.1);
            flex:1; min-height:450px; backdrop-filter:blur(10px); border:1px solid rgba(255,190,176,0.3);
        }
        .status-info { text-align:center; color:#333; padding:50px 20px; }
        .directory-container { background:rgba(255,240,245,0.9); padding:12px; border-radius:10px; margin-bottom:15px; }
        .directory-list { display:flex; gap:10px; margin-top:10px; flex-wrap:wrap; }
        .directory-item {
            padding:12px 16px; border:1px solid rgba(255,190,176,0.3); border-radius:8px; cursor:pointer;
            background:white; min-width:140px; color:#333; text-align:center;
        }
        .directory-item.active { background:linear-gradient(45deg,#ff9eb0,#ff7eb5); color:white; }

        /* 图片 & 重量卡片 */
        .image-results { display:flex; flex-direction:column; gap:15px; margin-top:20px; align-items:center; }
        .image-card {
            width:700px; max-width:100%; height:300px; border:1px solid rgba(255,190,176,0.3); border-radius:8px;
            overflow:hidden; background:white; cursor:pointer; display:flex; flex-direction:column;
        }
        .image-wrapper { width:100%; height:250px; display:flex; align-items:center; justify-content:center; background:white; border-bottom:1px solid rgba(255,190,176,0.2); }
        .image-wrapper img { max-width:100%; max-height:100%; object-fit:contain; }
        .image-info { padding:10px; text-align:center; }
        .image-code { font-weight:bold; color:#ff9eb0; }

        .weight-results { display:flex; flex-direction:column; gap:15px; align-items:center; }
        .weight-card { width:700px; max-width:100%; height:300px; border:1px solid rgba(255,190,176,0.3); border-radius:10px; background:white; display:flex; flex-direction:column; }
        .weight-header { background:linear-gradient(45deg,#ff9eb0,#ff7eb5); color:white; padding:12px 15px; font-weight:bold; display:flex; justify-content:space-between; align-items:center; height:50px; }
        .weight-content { padding:15px; flex:1; display:flex; flex-direction:column; }
        .weight-specs { display:grid; grid-template-columns:repeat(auto-fill,minmax(80px,1fr)); gap:8px; margin-top:10px; }
        .copy-all-btn { background:linear-gradient(45deg,#ff9eb0,#ff7eb5); color:white; border:none; border-radius:4px; padding:8px; cursor:pointer; margin-top:10px; }

        /* 模态框 */
        .image-modal { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.85); z-index:1000; justify-content:center; align-items:center; }
        .image-modal.active { display:flex; }
        .modal-content { max-width:90%; max-height:90%; background:rgba(255,240,245,0.95); border-radius:12px; overflow:hidden; }
        .modal-close { position:absolute; top:15px; right:15px; background:rgba(255,190,176,0.8); color:white; border:none; width:40px; height:40px; border-radius:50%; font-size:1.5rem; cursor:pointer; z-index:1001; }

        /* ===== 核心：横竖屏显示控制 ===== */
        /* 手机 & 平板：竖屏不显示时间容器 */
        @media (max-width: 1024px) and (orientation: portrait) {
            .time-display-container {
                display: none !important;
            }
            .main-content {
                flex-direction: column;
            }
            .results-container {
                width: 100%;
            }
        }

        /* 手机 & 平板：横屏显示时间，但隐藏右侧飞船日历（因右侧模块只在≥1025px显示，此处无需额外规则，但确保时间容器可见） */
        @media (max-width: 1024px) and (orientation: landscape) {
            .time-display-container {
                display: flex !important;
                width: 45% !important;
                min-width: 45% !important;
                height: 400px;
            }
            .main-content {
                flex-direction: row !important;
            }
            .results-container {
                width: 55% !important;
            }
            /* 强制隐藏飞船日历（虽然在1024px以下默认不显示，但双重保证） */
            .spaceship-weather-calendar {
                display: none !important;
            }
        }

        /* 手机小屏 (<768) 横屏时时间容器适配 */
        @media (max-width: 768px) and (orientation: landscape) {
            .time-display-container {
                width: 45% !important;
                min-width: 45% !important;
                height: 350px;
            }
        }

        /* 桌面 (≥1025px) 始终显示时间，并显示右侧飞船日历 */
        @media (min-width: 1025px) {
            .time-display-container {
                display: flex !important;
                width: 35% !important;
                min-width: 320px;
            }
        }

        /* 移动端/平板搜索栏切换：小于1025px且竖屏时使用移动端布局（输入框可点） */
        @media (max-width: 1024px) {
            /* 竖屏或横屏都采用移动端布局以保证输入框可点 (但横屏也可用移动端布局，输入框正常) */
            .desktop-search-layout {
                display: none !important;
            }
            .mobile-search-layout {
                display: flex !important;
            }
            /* 确保输入框可点击（移除任何pointer-events限制） */
            .mobile-search-input, .mobile-search-btn {
                pointer-events: auto !important;
                touch-action: manipulation;
            }
        }

        /* 极窄屏微调 */
        @media (max-width: 480px) {
            .mobile-search-row { height: 45px; }
            .mobile-search-input { font-size: 16px; }
        }

        /* 其他辅助 */
        .copy-notification { position:fixed; top:20px; right:20px; background:#2ecc71; color:white; padding:12px 20px; border-radius:8px; z-index:10000; animation:slideIn 0.3s; }
        @keyframes slideIn { from{transform:translateX(100%); opacity:0} to{transform:translateX(0); opacity:1} }
    </style>
</head>
<body>
    <div id="sakura"></div>
    <!-- 左侧花鸟 (桌面) -->
    <div class="illustration-container">
        <img src="https://jxy-ai-oss.juxieyun.com/assets/6/assistant/07a5bc1e4a884cd0b06434d46ae0f452/chat_bot/file-1770716767287.gif" alt="花鸟" class="astronaut-gif">
    </div>

    <!-- 右侧飞船日历 (桌面≥1025px显示) -->
    <div class="spaceship-weather-calendar" id="spaceshipWeatherCalendar">
        <div class="main-spaceship-fixed">
            <img src="https://jxy-ai-oss.juxieyun.com/assets/6/assistant/07a5bc1e4a884cd0b06434d46ae0f452/chat_bot/file-1770094500094.gif" alt="飞船" class="spaceship-gif-fixed">
        </div>
        <div class="connection-cable-fixed"></div>
        <div class="modules-container">
            <div class="weather-module-fixed" id="weatherModuleFixed">
                <div class="weather-module-header-fixed">
                    <div class="weather-module-title-fixed">🌤️ 天气</div>
                    <div class="weather-module-location-fixed" id="weatherModuleLocationFixed">加载中...</div>
                </div>
                <div class="weather-module-main-fixed">
                    <div class="weather-module-temp-fixed" id="weatherModuleTempFixed">--°C</div>
                    <div class="weather-module-icon-fixed" id="weatherModuleIconFixed">⏳</div>
                </div>
                <div class="weather-module-desc-fixed" id="weatherModuleDescFixed">正在获取数据...</div>
                <div class="weather-module-details-fixed">
                    <div><span class="weather-module-detail-label-fixed">湿度</span><span id="weatherModuleHumidityFixed">--%</span></div>
                    <div><span class="weather-module-detail-label-fixed">风速</span><span id="weatherModuleWindFixed">--m/s</span></div>
                    <div><span class="weather-module-detail-label-fixed">体感</span><span id="weatherModuleFeelsLikeFixed">--°C</span></div>
                </div>
            </div>
            <div class="calendar-module-fixed" id="calendarModuleFixed">
                <div class="calendar-module-header-fixed">
                    <div class="calendar-module-title-fixed">📅 日历</div>
                    <div class="calendar-module-date-fixed" id="calendarModuleDateFixed">--月--日</div>
                    <div class="calendar-module-lunar-fixed" id="calendarModuleLunarFixed">农历--月--</div>
                </div>
                <div class="calendar-module-grid-fixed" id="calendarModuleGridFixed"></div>
            </div>
        </div>
    </div>

    <!-- 公告条 -->
    <div class="announcement-bar info" id="announcementBar">
        <div class="announcement-content"><div class="announcement-scroll" id="announcementScroll"></div></div>
        <button class="announcement-close" onclick="closeAnnouncement()">×</button>
    </div>

    <!-- 图片模态框 -->
    <div class="image-modal" id="imageModal">
        <button class="modal-close" onclick="closeModal()">×</button>
        <div class="modal-content"><div class="modal-image-container" style="padding:20px;"><img id="modalImage" src="" alt=""></div></div>
    </div>

    <!-- 主要内容 -->
    <div class="main-content-area">
        <div class="search-container">
            <h1>👕📊 尺寸表搜索工具</h1>
            <div class="update-status" id="updateStatus"><span class="loading-spinner"></span> 正在初始化系统...</div>
            <div class="search-type">
                <button class="search-type-btn active" id="imageSearchBtn" onclick="setSearchType('image')">👚 尺寸表搜索</button>
                <button class="search-type-btn" id="weightSearchBtn" onclick="setSearchType('weight')">⚖️ 重量搜索</button>
            </div>
            <div class="search-controls">
                <div class="search-input-container">
                    <!-- 电脑端布局 -->
                    <div class="desktop-search-layout">
                        <div class="desktop-search-row">
                            <img src="https://jxy-ai-oss.juxieyun.com/assets/6/assistant/07a5bc1e4a884cd0b06434d46ae0f452/chat_bot/file-1769933687880.gif" alt="舞狮" class="desktop-lion-dance-gif">
                            <input type="text" id="searchInputDesktop" class="desktop-search-input" placeholder="输入款号并搜索">
                            <button class="desktop-search-btn" onclick="searchDesktop()"><span>搜索</span></button>
                        </div>
                    </div>
                    <!-- 移动端布局 (在<=1024px时显示) -->
                    <div class="mobile-search-layout">
                        <div class="mobile-search-row">
                            <img src="https://jxy-ai-oss.juxieyun.com/assets/6/assistant/07a5bc1e4a884cd0b06434d46ae0f452/chat_bot/file-1769933687880.gif" alt="舞狮" class="mobile-lion-dance-gif">
                            <input type="text" id="searchInputMobile" class="mobile-search-input" placeholder="输入款号并搜索">
                        </div>
                        <button class="mobile-search-btn" onclick="searchMobile()"><span>搜索</span></button>
                    </div>
                </div>
            </div>
            <div class="results-info" id="resultsInfo"></div>
        </div>

        <div class="directory-container" id="directoryContainer" style="display: none;">
            <h3>📁 选择数据目录</h3>
            <div class="directory-list" id="directoryList"></div>
        </div>

        <div class="main-content">
            <!-- 时间显示区域 (横屏手机/平板可见，竖屏隐藏) -->
            <div class="time-display-container" id="timeDisplayContainer">
                <h2>⏰ 时间显示</h2>
                <div class="time-wrapper">
                    <div class="fliqlo-time-display" id="fliqloTimeDisplay">
                        <div class="fliqlo-clock">
                            <div class="time-digits">
                                <span id="hour1">0</span><span id="hour2">0</span><span class="time-colon">:</span>
                                <span id="minute1">0</span><span id="minute2">0</span><span class="time-colon">:</span>
                                <span id="second1">0</span><span id="second2">0</span>
                            </div>
                            <div class="time-separator"></div>
                            <div class="date-display" id="dateDisplay">YYYY-MM-DD</div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- 搜索结果区域 -->
            <div class="results-container" id="results">
                <div class="status-info"><p>📥 正在加载数据，请稍候...</p></div>
            </div>
        </div>
    </div>

    <script>
        // ========== 配置 & 全局变量 ==========
        const DATA_DIRECTORIES = [{ name:"本地数据文件", url:"./images.json" }, { name:"CDN备份", url:"https://cdn.jsdelivr.net/gh/iptv369/image-database@main/images.json" }];
        const SAMPLE_DATA = [{ code:"17A3", description:"示例图片1", date:"2023-10-01", url:"https://picsum.photos/id/1/300/200" }];
        let weightData = { "17A3":{"S":"220g","M":"240g","L":"260g"} };
        let imageData = [], currentSearchType = 'image', currentDataSource = null, weatherApiKey = "", currentWeatherCity = "东莞";

        // ========== Fliqlo时钟 ==========
        function updateFliqloTime() {
            const now = new Date();
            const h = now.getHours().toString().padStart(2,'0'), m = now.getMinutes().toString().padStart(2,'0'), s = now.getSeconds().toString().padStart(2,'0');
            const el = id => document.getElementById(id);
            if(el('hour1')) { el('hour1').textContent = h[0]; el('hour2').textContent = h[1]; el('minute1').textContent = m[0]; el('minute2').textContent = m[1]; el('second1').textContent = s[0]; el('second2').textContent = s[1]; }
            if(el('dateDisplay')) el('dateDisplay').textContent = now.toISOString().slice(0,10);
        }
        setInterval(updateFliqloTime, 1000);
        updateFliqloTime();

        // ========== 天气/日历模块 (简版) ==========
        async function fetchRealWeather() {
            // 模拟天气
            const mock = { temperature:25, condition:'晴', humidity:60, windSpeed:3, feelsLike:26, icon:'☀️' };
            document.getElementById('weatherModuleTempFixed').textContent = '25°C';
            document.getElementById('weatherModuleIconFixed').textContent = '☀️';
            document.getElementById('weatherModuleDescFixed').textContent = '晴朗';
            document.getElementById('weatherModuleHumidityFixed').textContent = '60%';
            document.getElementById('weatherModuleWindFixed').textContent = '3 m/s';
            document.getElementById('weatherModuleFeelsLikeFixed').textContent = '26°C';
        }
        function generateFixedCalendar() {
            const now = new Date(), y=now.getFullYear(), m=now.getMonth(), d=now.getDate();
            document.getElementById('calendarModuleDateFixed').textContent = `${m+1}月${d}日`;
            document.getElementById('calendarModuleLunarFixed').textContent = '农历乙巳年三月初五';
            const grid = document.getElementById('calendarModuleGridFixed');
            if(!grid) return;
            grid.innerHTML = '';
            for(let i=0; i<7; i++) grid.innerHTML += `<div class="calendar-module-date-cell-fixed ${i===2?'today':''}">${i+1}</div>`;
        }
        fetchRealWeather(); generateFixedCalendar();

        // ========== 初始化 ==========
        async function initialize() {
            createSakuraPetals();
            document.getElementById('updateStatus').innerHTML = '✅ 数据加载就绪 (示例模式)';
            imageData = SAMPLE_DATA;
            document.getElementById('results').innerHTML = '<div class="status-info"><p>请选择搜索类型并输入款号</p></div>';
        }

        // 樱花
        function createSakuraPetals() {
            const container = document.getElementById('sakura');
            for(let i=0;i<20;i++) {
                const p = document.createElement('div'); p.className = 'sakura-petal';
                p.style.width = (Math.random()*10+5)+'px'; p.style.height = p.style.width;
                p.style.left = Math.random()*100+'%'; p.style.animationDuration = (Math.random()*5+8)+'s';
                p.style.animationDelay = Math.random()*5+'s'; container.appendChild(p);
            }
        }

        // 公告
        function loadAnnouncements() {
            const scroll = document.getElementById('announcementScroll');
            if(scroll) scroll.innerText = '🎉 欢迎使用尺寸表搜索工具 | 手机竖屏隐藏时间，横屏显示时间，右侧日历仅桌面可见';
        }
        loadAnnouncements();
        window.closeAnnouncement = () => document.getElementById('announcementBar').classList.add('hidden');

        // 搜索类型
        window.setSearchType = (type) => {
            currentSearchType = type;
            document.getElementById('imageSearchBtn').classList.toggle('active',type==='image');
            document.getElementById('weightSearchBtn').classList.toggle('active',type==='weight');
        };

        // 搜索函数 (简版)
        function performSearch(query) {
            if(!query) return;
            const results = document.getElementById('results');
            if(currentSearchType === 'image') {
                results.innerHTML = `<div class="image-results"><div class="image-card"><div class="image-wrapper"><img src="https://picsum.photos/300/200?random=1"></div><div class="image-info"><div class="image-code">示例款号: ${query}</div></div></div></div>`;
            } else {
                results.innerHTML = `<div class="weight-results"><div class="weight-card"><div class="weight-header"><span>${query}</span><button>📋复制</button></div><div class="weight-content"><div class="weight-specs"><div class="weight-spec-item">S: 220g</div></div></div></div></div>`;
            }
            document.getElementById('resultsInfo').innerHTML = `<p>找到 1 个结果</p>`;
        }

        window.searchDesktop = () => { const q = document.getElementById('searchInputDesktop').value.trim(); if(q) performSearch(q); };
        window.searchMobile = () => { const q = document.getElementById('searchInputMobile').value.trim(); if(q) performSearch(q); };

        // 同步两个输入框
        document.getElementById('searchInputDesktop')?.addEventListener('input', (e) => document.getElementById('searchInputMobile').value = e.target.value);
        document.getElementById('searchInputMobile')?.addEventListener('input', (e) => document.getElementById('searchInputDesktop').value = e.target.value);
        document.getElementById('searchInputDesktop')?.addEventListener('keypress', (e) => e.key==='Enter' && searchDesktop());
        document.getElementById('searchInputMobile')?.addEventListener('keypress', (e) => e.key==='Enter' && searchMobile());

        // 模态框
        window.openImageModal = (url, code) => { const m=document.getElementById('imageModal'); m.querySelector('#modalImage').src=url; m.classList.add('active'); };
        window.closeModal = () => document.getElementById('imageModal').classList.remove('active');

        // 其他占位函数
        window.loadFromDirectory = () => { alert('示例模式，请自行接入数据'); };

        // 启动
        initialize();
    </script>
</body>
</html>
